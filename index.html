<!DOCTYPE html>
<html lang="fr-be">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clémentine Dewerchin | CV 🍊</title>
    <link rel="icon" href="./assets/icons/cv.png">
    <link rel="stylesheet" href="./styles/color.css">
    <link rel="stylesheet" href="./styles/main.css">
    <script src="./scripts/main.js" defer></script>
</head>

<body class="classic_mode">

    <main>
        <div class="column">
            <div class="name_title" id="name_title">
                <div class="name">Clémentine Dewerchin</div>
                <div class="job_title">Web App Developer student</div>
                <div class="icons_mode">
                    <button id="dark_mode_btn">
                        🌙
                    </button>
                    <button id="classic_mode_btn">
                        💡
                    </button>
                </div>
            </div>
            <div class="colors_palette" id="menu_div">
                <div class="about menu" id="menu_about" tabindex="0" role="button">A propos</div>
                <div class="formations menu" id="menu_formations" tabindex="0" role="button">Formations</div>
                <div class="jobs menu" id="menu_experiences" tabindex="0" role="button">Expériences</div>
                <div class="contact menu" id="menu_contact" tabindex="0" role="button">Contact</div>
            </div>
        </div> 
        <div class="card hidden" id="card_about"></div>
        <div class="card hidden" id="card_formations"></div>
        <div class="card hidden" id="card_experiences"></div>
        <div class="card hidden" id="card_contact"></div>
    </main>
</body>
</html>
